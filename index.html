<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Standard</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #050505;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 8vw;
      font-family: "Avenir Next Condensed", "Helvetica Neue", "Arial Narrow", sans-serif;
    }

    main {
      width: min(92vw, 900px);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.75rem, 11vw, 8.5rem);
      font-weight: 600;
      line-height: 0.88;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-rendering: geometricPrecision;
    }

    h1 span {
      display: block;
    }

    h1 span:last-child {
      letter-spacing: 0.26em;
      margin-top: 0.08em;
    }

    @media (max-width: 640px) {
      body {
        padding: 12vw 8vw;
      }

      h1 {
        font-size: clamp(3rem, 16vw, 5rem);
        line-height: 0.92;
        letter-spacing: 0.14em;
      }

      h1 span:last-child {
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 aria-label="Sovereign Standard">
      <span>Sovereign</span>
      <span>Standard</span>
    </h1>
  </main>
</body>
</html>
