name: Admin Unit State

on:
  repository_dispatch:
    types:
      - admin-unit-state
  workflow_dispatch:
    inputs:
      action:
        description: Admin action
        required: true
        type: choice
        options:
          - clear-claim
          - set-partner
          - clear-partner
      unit:
        description: Unit number
        required: true
      reference:
        description: Optional partner reference
        required: false

permissions:
  contents: write

jobs:
  apply:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Apply admin change
        env:
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          ADMIN_ACTION: ${{ inputs.action }}
          ADMIN_UNIT: ${{ inputs.unit }}
          ADMIN_REFERENCE: ${{ inputs.reference }}
          SOVEREIGN_CLAIM_SECRET: ${{ secrets.SOVEREIGN_CLAIM_SECRET }}
        run: |
          if [ -n "$DISPATCH_PAYLOAD" ] && [ "$DISPATCH_PAYLOAD" != "null" ]; then
            PAYLOAD_ACTION="$(python3 -c 'import json, os; payload=json.loads(os.environ["DISPATCH_PAYLOAD"]); print(payload.get("action", ""))')"
            PAYLOAD_UNIT="$(python3 -c 'import json, os; payload=json.loads(os.environ["DISPATCH_PAYLOAD"]); print(payload.get("unit", ""))')"
            PAYLOAD_REFERENCE="$(python3 -c 'import json, os; payload=json.loads(os.environ["DISPATCH_PAYLOAD"]); print(payload.get("reference", ""))')"
          else
            PAYLOAD_ACTION="$ADMIN_ACTION"
            PAYLOAD_UNIT="$ADMIN_UNIT"
            PAYLOAD_REFERENCE="$ADMIN_REFERENCE"
          fi

          case "$PAYLOAD_ACTION" in
            clear-claim)
              swift run SovereignStandard clear-claim "$PAYLOAD_UNIT"
              ;;
            set-partner)
              swift run SovereignStandard set-partner "$PAYLOAD_UNIT" "$PAYLOAD_REFERENCE"
              ;;
            clear-partner)
              swift run SovereignStandard clear-partner "$PAYLOAD_UNIT"
              ;;
            *)
              echo "Unsupported action: $PAYLOAD_ACTION"
              exit 1
              ;;
          esac

      - name: Run tests
        run: swift test

      - name: Commit admin change
        env:
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          INPUT_ACTION: ${{ inputs.action }}
          INPUT_UNIT: ${{ inputs.unit }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add claims.json partners.json units.json
          if [ -n "$DISPATCH_PAYLOAD" ] && [ "$DISPATCH_PAYLOAD" != "null" ]; then
            ACTION="$(python3 -c 'import json, os; payload=json.loads(os.environ["DISPATCH_PAYLOAD"]); print(payload.get("action", ""))')"
            UNIT="$(python3 -c 'import json, os; payload=json.loads(os.environ["DISPATCH_PAYLOAD"]); print(payload.get("unit", ""))')"
          else
            ACTION="$INPUT_ACTION"
            UNIT="$INPUT_UNIT"
          fi
          git commit -m "Admin state change: $ACTION unit $UNIT" || exit 0
          git push
