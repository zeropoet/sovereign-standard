<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Standard</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --fg: #c8c5bd;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: clamp(1.5rem, 4vw, 3.5rem);
      font-family: Palatino, "Palatino Linotype", "Book Antiqua", serif;
      font-synthesis: weight;
    }

    main {
      width: 100%;
      display: grid;
      place-items: center;
    }

    .mark {
      display: grid;
      justify-items: center;
    }

    h1 {
      margin: 0;
      color: var(--fg);
      font-family: Didot, Bodoni MT, "Times New Roman", serif;
      font-size: clamp(1.55rem, 5vw, 3.35rem);
      font-weight: 800;
      line-height: 0.8;
      text-transform: uppercase;
      text-rendering: geometricPrecision;
      text-align: center;
      width: min-content;
      max-width: 100%;
      font-kerning: normal;
      font-variant-ligatures: none;
    }

    h1 span {
      display: block;
      min-width: 0;
    }

    h1 span:last-child {
      margin-top: 0.04em;
    }

    @media (min-width: 1280px) {
      h1 {
        font-size: clamp(2.4rem, 3vw, 4rem);
        line-height: 0.79;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: clamp(1.25rem, 7vw, 2.5rem);
      }

      h1 {
        font-size: clamp(1.3rem, 8.6vw, 2rem);
        line-height: 0.82;
      }

      h1 span:last-child {
        margin-top: 0.05em;
      }
    }

    @media (max-width: 420px) {
      h1 {
        font-size: clamp(1.1rem, 9.2vw, 1.55rem);
        line-height: 0.84;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="mark" aria-label="Sovereign Standard">
      <h1 aria-label="Sovereign Standard">
        <span>Søvereign</span>
        <span>Standard</span>
      </h1>
    </section>
  </main>
</body>
</html>
