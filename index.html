<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Standard</title>
  <style>
    :root {
      --bg: #111111;
      --fg: #c8c5bd;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: clamp(1.5rem, 4vw, 3.5rem);
      font-family: Palatino, "Palatino Linotype", "Book Antiqua", serif;
      font-synthesis: weight;
    }

    main {
      width: 100%;
      display: grid;
      place-items: center;
    }

    .mark {
      display: grid;
      justify-items: center;
    }

    .logo {
      width: min(92vw, 36rem);
      height: auto;
      display: block;
    }

    @media (min-width: 1280px) {
      .logo {
        width: min(70vw, 42rem);
      }
    }

    @media (max-width: 720px) {
      body {
        padding: clamp(1.25rem, 7vw, 2.5rem);
      }
    }

    @media (max-width: 420px) {
      .logo {
        width: 96vw;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="mark" aria-label="Sovereign Standard">
      <img class="logo" src="images/SovereignStandard_Logo.png" alt="Sovereign Standard">
    </section>
  </main>
</body>
</html>
