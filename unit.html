<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit</title>
  <meta name="description" content="A deterministic Sovereign Standard unit artifact.">
  <link id="canonical-link" rel="canonical" href="https://sovereignstandard.co/unit.html">
  <link rel="icon" href="assets/favicons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="assets/favicons/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicons/favicon-64x64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicons/android-chrome-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sovereign Standard">
  <meta id="og-title" property="og:title" content="Unit · Sovereign Standard">
  <meta id="og-description" property="og:description" content="A deterministic Sovereign Standard unit artifact.">
  <meta id="og-url" property="og:url" content="https://sovereignstandard.co/unit.html">
  <meta property="og:image" content="https://sovereignstandard.co/assets/social-preview.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta id="twitter-title" name="twitter:title" content="Unit · Sovereign Standard">
  <meta id="twitter-description" name="twitter:description" content="A deterministic Sovereign Standard unit artifact.">
  <meta name="twitter:image" content="https://sovereignstandard.co/assets/social-preview.svg">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="artifact-page">
    <nav class="top-links" aria-label="Primary">
      <a href="index.html" class="nav">Back</a>
    </nav>
    <header class="page-header artifact-header">
      <h1 class="page-title" id="unit-title">Unit</h1>
    </header>

    <nav class="unit-pagination artifact-section" aria-label="Unit navigation">
      <a id="unit-prev" class="unit-pagination-link" href="archive.html">Previous</a>
      <a id="unit-next" class="unit-pagination-link" href="archive.html">Next</a>
    </nav>

    <section class="artifact-grid artifact-section">
      <article class="panel artifact-figure">
        <h3>Front</h3>
        <img id="front" alt="Front layout">
      </article>
      <article class="panel artifact-figure">
        <h3>Back</h3>
        <img id="back" alt="Back layout">
      </article>
      <article class="panel artifact-figure">
        <h3>Sigil</h3>
        <img id="sigil" alt="Sigil">
      </article>
      <article class="panel artifact-figure">
        <h3>QR</h3>
        <img id="qr" alt="QR code">
      </article>
    </section>

    <section class="panel section-stack artifact-section metadata-section">
      <div class="section-head">
        <h2>Metadata</h2>
      </div>
      <div id="meta-list" class="meta-list"></div>
    </section>

  </main>

  <script src="site.js"></script>
  <script>
    async function loadUnit() {
      const params = new URLSearchParams(window.location.search);
      const unitID = params.get('id');

      if (!unitID) {
        throw new Error('Missing unit id');
      }

      const unitURL = `https://sovereignstandard.co/unit.html?id=${unitID}`;
      const unitTitle = `Unit ${unitID} · Sovereign Standard`;
      const unitDescription = `Deterministic artifact record for Sovereign Standard unit ${unitID}.`;

      document.title = unitTitle;
      document.getElementById('unit-title').textContent = `Unit ${unitID}`;
      document.getElementById('canonical-link').href = unitURL;
      document.querySelector('meta[name="description"]').content = unitDescription;
      document.getElementById('og-title').content = unitTitle;
      document.getElementById('og-description').content = unitDescription;
      document.getElementById('og-url').content = unitURL;
      document.getElementById('twitter-title').content = unitTitle;
      document.getElementById('twitter-description').content = unitDescription;

      const unitManifest = await fetch('units.json', { cache: 'no-store' })
        .then((response) => response.ok ? response.json() : null);
      const unitList = unitManifest?.units ?? [];
      const unitIndex = unitList.indexOf(Number(unitID));
      const previousUnit = unitIndex > 0 ? unitList[unitIndex - 1] : null;
      const nextUnit = unitIndex >= 0 && unitIndex < unitList.length - 1 ? unitList[unitIndex + 1] : null;

      const previousLink = document.getElementById('unit-prev');
      const nextLink = document.getElementById('unit-next');

      if (previousUnit !== null) {
        previousLink.href = `unit.html?id=${previousUnit}`;
        previousLink.textContent = `Previous ${previousUnit}`;
      } else {
        previousLink.removeAttribute('href');
        previousLink.setAttribute('aria-disabled', 'true');
        previousLink.textContent = 'Previous';
      }

      if (nextUnit !== null) {
        nextLink.href = `unit.html?id=${nextUnit}`;
        nextLink.textContent = `Next ${nextUnit}`;
      } else {
        nextLink.removeAttribute('href');
        nextLink.setAttribute('aria-disabled', 'true');
        nextLink.textContent = 'Next';
      }

      document.addEventListener('keydown', (event) => {
        const activeTag = document.activeElement?.tagName;
        const isTypingContext = activeTag === 'INPUT' || activeTag === 'TEXTAREA' || document.activeElement?.isContentEditable;

        if (isTypingContext) {
          return;
        }

        if (event.key === 'ArrowLeft' && previousLink.hasAttribute('href')) {
          window.location.href = previousLink.href;
        }

        if (event.key === 'ArrowRight' && nextLink.hasAttribute('href')) {
          window.location.href = nextLink.href;
        }
      });

      const data = await fetch(`output/${unitID}/data.json`, { cache: 'no-store' }).then((response) => {
        if (!response.ok) {
          throw new Error(`Unit ${unitID} is not available`);
        }
        return response.json();
      });
      const issuance = await fetch(`output/${unitID}/issuance.json`, { cache: 'no-store' })
        .then((response) => response.ok ? response.json() : null);

      document.getElementById('front').src = `output/${unitID}/front.svg`;
      document.getElementById('back').src = `output/${unitID}/back.svg`;
      document.getElementById('sigil').src = `output/${unitID}/sigil.svg`;
      document.getElementById('qr').src = `output/${unitID}/qr.svg`;

      document.getElementById('meta-list').innerHTML = `
        <div class="meta-column">
          <div class="meta-group">
            <div><span>Commit index</span><br><span class="code">${unitID}</span></div>
            <div><span>Creation date</span><br><span class="code">${issuance?.creation_date ?? 'Unavailable'}</span></div>
            <div><span>Integrity number</span><br><span class="code">${issuance?.integrity ?? 'Unavailable'}</span></div>
          </div>
          <div class="meta-group">
            <div><span>Composition</span><br><span class="code">Green Sencha 75g<br>Lemon Balm 33g<br>Kapoor Tulsi 27g<br>Ginger 15g</span></div>
          </div>
          <div class="meta-group">
            <h3>Standard, held.</h3>
          </div>
        </div>
        <div class="meta-column">
          <div class="meta-group">
            <div><span>Starting permutation</span><br><span class="code">${data.permutation.join(', ')}</span></div>
            <div><span>Convergence hash</span><br><span class="code">${data.hash}</span></div>
            <div><span>Canonical distance</span><br><span class="code">${data.canonical_distance}</span></div>
          </div>
          <div class="meta-group">
            <div><span>Walker version</span><br><span class="code">${data.walker_version}</span></div>
            <div><span>Kernel version</span><br><span class="code">${data.kernel_version}</span></div>
            <div><span>Step count</span><br><span class="code">${data.step_count}</span></div>
          </div>
          <div class="meta-group">
            <div><span>Engraving depth (µm)</span><br><span class="code">Pending</span></div>
            <div><span>Line width (µm)</span><br><span class="code">Pending</span></div>
            <div><span>Energy density</span><br><span class="code">Pending</span></div>
          </div>
        </div>
      `;
    }

    loadUnit().catch((error) => {
      document.querySelector('.artifact-grid').innerHTML = '';
      document.getElementById('meta-list').innerHTML = `<p class="muted">${error.message}</p>`;
    });
  </script>
</body>
</html>
