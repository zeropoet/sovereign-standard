<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Standard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <span class="eyebrow">Sovereign Standard</span>
      <h1>STANDARD CONTROL</h1>
    </section>

    <section class="panel admin-panel">
      <label>
        GitHub token
        <input id="token" type="password" placeholder="Fine-grained token with Actions + Contents write access">
      </label>
      <label>
        Unit IDs
        <input id="unit-ids" type="text" placeholder="136 or 136,137,138">
      </label>
      <div class="button-row">
        <button id="generate">Generate</button>
        <button id="delete" class="danger">Delete</button>
        <button id="sync">Sync Site</button>
      </div>
      <p id="status" class="status"></p>
    </section>
  </main>

  <script>
    const owner = 'zeropoet';
    const repo = 'sovereign-standard';
    const workflowId = 'control.yml';
    const ref = 'main';

    async function dispatch(operation) {
      const token = document.getElementById('token').value.trim();
      const unitIDs = document.getElementById('unit-ids').value.trim();
      const status = document.getElementById('status');

      if (!token) {
        status.textContent = 'A GitHub token is required.';
        return;
      }

      if ((operation === 'generate' || operation === 'delete') && !unitIDs) {
        status.textContent = 'Enter at least one unit id.';
        return;
      }

      status.textContent = `Dispatching ${operation}...`;

      const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/${workflowId}/dispatches`, {
        method: 'POST',
        headers: {
          'Accept': 'application/vnd.github+json',
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          ref,
          inputs: {
            operation,
            unit_ids: unitIDs
          }
        })
      });

      if (!response.ok) {
        const body = await response.text();
        throw new Error(body || `Dispatch failed with ${response.status}`);
      }

      status.textContent = `${operation} dispatched. Check the Actions tab for completion.`;
    }

    document.getElementById('generate').addEventListener('click', () => dispatch('generate').catch(showError));
    document.getElementById('delete').addEventListener('click', () => dispatch('delete').catch(showError));
    document.getElementById('sync').addEventListener('click', () => dispatch('sync-site').catch(showError));

    function showError(error) {
      document.getElementById('status').textContent = error.message;
    }
  </script>
</body>
</html>
