name: Persist Claim

on:
  repository_dispatch:
    types:
      - persist-claim
  workflow_dispatch:
    inputs:
      unit:
        description: Unit number
        required: true
      claimed_at:
        description: Claim timestamp ISO8601
        required: true
      claim_code:
        description: Internal claim code
        required: true

permissions:
  contents: write

jobs:
  persist:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build claim submission
        env:
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          INPUT_UNIT: ${{ inputs.unit }}
          INPUT_CLAIMED_AT: ${{ inputs.claimed_at }}
          INPUT_CLAIM_CODE: ${{ inputs.claim_code }}
        run: |
          python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ.get("DISPATCH_PAYLOAD") or "{}")
          use_dispatch = bool(payload)
          data = {
              "unit": int(payload.get("unit") if use_dispatch else os.environ["INPUT_UNIT"]),
              "claimed_at": payload.get("claimed_at") if use_dispatch else os.environ["INPUT_CLAIMED_AT"],
              "claim_code": payload.get("claim_code") if use_dispatch else os.environ["INPUT_CLAIM_CODE"]
          }
          with open("claim-submission.json", "w", encoding="utf-8") as handle:
              json.dump(data, handle, indent=2, sort_keys=True)
          PY

      - name: Persist claim and refresh site
        env:
          SOVEREIGN_CLAIM_SECRET: ${{ secrets.SOVEREIGN_CLAIM_SECRET }}
        run: swift run SovereignStandard persist-claim claim-submission.json

      - name: Run tests
        run: swift test

      - name: Commit claim
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add claims.json units.json
          git commit -m "Persist claim for unit $(python3 -c 'import json; print(json.load(open("claim-submission.json"))["unit"])')" || exit 0
          git push
