name: Sovereign Control

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation to perform"
        required: true
        type: choice
        options:
          - generate
          - delete
          - sync-site
      unit_ids:
        description: "Comma-separated unit IDs for generate/delete"
        required: false
        type: string

permissions:
  contents: write

jobs:
  control:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run control command
        run: |
          if [ "${{ inputs.operation }}" = "sync-site" ]; then
            swift run SovereignStandard sync-site
          else
            swift run SovereignStandard "${{ inputs.operation }}" "${{ inputs.unit_ids }}"
          fi

      - name: Commit changes
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output units.json
          git commit -m "Control: ${{ inputs.operation }} ${{ inputs.unit_ids }}"
          git push
