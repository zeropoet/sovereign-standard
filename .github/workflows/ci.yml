name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: swift test

      - name: Verify committed artifacts
        run: swift run SovereignStandard verify-all

      - name: Regenerate committed archive
        run: swift run SovereignStandard generate {0..135}
        shell: bash

      - name: Fail on archive drift
        run: git diff --exit-code -- output units.json
