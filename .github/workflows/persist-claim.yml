name: Persist Claim

on:
  repository_dispatch:
    types:
      - persist-claim
  workflow_dispatch:
    inputs:
      unit:
        description: Unit number
        required: true
      email:
        description: Collector email
        required: true
      name:
        description: Collector name
        required: false
      claimed_at:
        description: Claim timestamp ISO8601
        required: true
      claim_hash:
        description: Claim hash
        required: true
      image_sha256:
        description: Proof image SHA256
        required: false

permissions:
  contents: write

jobs:
  persist:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build claim submission
        env:
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          INPUT_UNIT: ${{ inputs.unit }}
          INPUT_EMAIL: ${{ inputs.email }}
          INPUT_NAME: ${{ inputs.name }}
          INPUT_CLAIMED_AT: ${{ inputs.claimed_at }}
          INPUT_CLAIM_HASH: ${{ inputs.claim_hash }}
          INPUT_IMAGE_SHA256: ${{ inputs.image_sha256 }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os

          payload = json.loads(os.environ.get("DISPATCH_PAYLOAD") or "{}")
          use_dispatch = bool(payload)
          image_base64 = payload.get("image_base64", "") if use_dispatch else ""
          if image_base64:
              with open("claim-proof.jpg", "wb") as handle:
                  handle.write(base64.b64decode(image_base64))
          data = {
              "unit": int(payload.get("unit") if use_dispatch else os.environ["INPUT_UNIT"]),
              "email": payload.get("email") if use_dispatch else os.environ["INPUT_EMAIL"],
              "name": payload.get("name") if use_dispatch else os.environ.get("INPUT_NAME") or None,
              "claimed_at": payload.get("claimed_at") if use_dispatch else os.environ["INPUT_CLAIMED_AT"],
              "claim_hash": payload.get("claim_hash") if use_dispatch else os.environ["INPUT_CLAIM_HASH"],
              "image_sha256": payload.get("image_sha256") if use_dispatch else os.environ.get("INPUT_IMAGE_SHA256") or None,
              "proof_image_path": "claim-proof.jpg" if image_base64 else None,
              "verification": payload.get("verification") if use_dispatch else {
                  "method": "image",
                  "confidence": 0.88
              }
          }
          with open("claim-submission.json", "w", encoding="utf-8") as handle:
              json.dump(data, handle, indent=2, sort_keys=True)
          PY

      - name: Persist claim and refresh site
        run: swift run SovereignStandard persist-claim claim-submission.json

      - name: Run tests
        run: swift test

      - name: Commit claim
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add claims.json units.json
          git commit -m "Persist claim for unit $(python3 -c 'import json; print(json.load(open("claim-submission.json"))["unit"])')" || exit 0
          git push
