<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Standard Archive</title>
  <meta name="description" content="Browse the deterministic Sovereign Standard artifact archive.">
  <link rel="canonical" href="https://sovereignstandard.co/archive.html">
  <link rel="icon" href="assets/favicons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="assets/favicons/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicons/favicon-64x64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicons/android-chrome-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sovereign Standard">
  <meta property="og:title" content="Sovereign Standard Archive">
  <meta property="og:description" content="Browse the deterministic Sovereign Standard artifact archive.">
  <meta property="og:url" content="https://sovereignstandard.co/archive.html">
  <meta property="og:image" content="https://sovereignstandard.co/assets/social-preview.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sovereign Standard Archive">
  <meta name="twitter:description" content="Browse the deterministic Sovereign Standard artifact archive.">
  <meta name="twitter:image" content="https://sovereignstandard.co/assets/social-preview.svg">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="archive-page">
    <nav class="top-links" aria-label="Primary">
      <a href="index.html" class="nav">Sovereign Standard</a>
      <a href="about.html" class="nav">The System</a>
    </nav>
    <header class="page-header">
      <h1 class="page-title">Artifact Archive</h1>
      <p class="page-intro">Each unit represents a deterministic Sovereign Engine output.</p>
      <p class="page-intro" id="unit-count">0 units created</p>
      <label class="archive-search" for="unit-search">
        <input id="unit-search" name="unit-search" type="search" inputmode="numeric" placeholder="Enter a unit number" autocomplete="off">
      </label>
    </header>
    <div id="gallery"></div>
    <footer class="site-footer">SOVEREIGN STANDARD - <span id="site-year"></span></footer>
  </main>

  <script src="site.js"></script>
  <script>
    async function loadUnits() {
      const response = await fetch('units.json', { cache: 'no-store' });
      const manifest = await response.json();
      const gallery = document.getElementById('gallery');
      const unitCount = document.getElementById('unit-count');
      const unitSearch = document.getElementById('unit-search');

      unitCount.textContent = `${manifest.units.length} units created`;

      if (!manifest.units.length) {
        gallery.innerHTML = '<p>No artifacts indexed yet.</p>';
        return;
      }

      const renderGallery = (query = '') => {
        const normalizedQuery = query.trim();
        const filteredUnits = normalizedQuery
          ? manifest.units.filter((unitID) => `${unitID}`.includes(normalizedQuery))
          : manifest.units;

        gallery.innerHTML = '';

        if (!filteredUnits.length) {
          gallery.innerHTML = '<p class="muted">No units match that search.</p>';
          return;
        }

        for (const unitID of filteredUnits) {
          const card = document.createElement('article');
          card.className = 'artifact-card panel';

          const link = document.createElement('a');
          link.href = `unit.html?id=${unitID}`;
          link.className = 'artifact-link';

          const img = document.createElement('img');
          img.loading = 'lazy';
          img.width = 180;
          img.height = 180;
          img.src = `output/${unitID}/sigil.svg`;
          img.alt = `Sigil for unit ${unitID}`;

          const code = document.createElement('code');
          code.textContent = `${unitID}`;

          link.append(img, code);
          card.append(link);
          gallery.append(card);
        }
      };

      unitSearch.addEventListener('input', (event) => {
        renderGallery(event.target.value);
      });

      renderGallery(unitSearch.value);
    }

    loadUnits().catch(() => {
      document.getElementById('gallery').innerHTML = '<p>Unable to load artifact index.</p>';
    });
  </script>
</body>
</html>
